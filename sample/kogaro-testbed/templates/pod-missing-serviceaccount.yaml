# NOTE: dangling_service_account cannot be tested in a live cluster because
# Kubernetes rejects pod creation when referencing a non-existent ServiceAccount.
# This validation is only useful for:
#   1. Detecting SA deletion AFTER pods were created
#   2. Validating YAML files before applying (--config mode)
#
# This test case uses an existing SA to avoid creation errors.
# The dangling_service_account validation is tested via unit tests.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-serviceaccount
  namespace: {{ .Values.namespace | default "kogaro-testbed" }}
  labels:
    {{- include "kogaro-testbed.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kogaro-testbed.fullname" . }}-serviceaccount-test
  labels:
    {{- include "kogaro-testbed.labels" . | nindent 4 }}
    test-case: "serviceaccount-test"
    test-category: "reference-validation"
  annotations:
    test-description: "Tests ServiceAccount reference validation (valid SA)"
spec:
  serviceAccountName: test-serviceaccount  # Valid SA reference
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
  containers:
  - name: test-container
    image: busybox:1.35
    securityContext:
      runAsUser: 1000
      runAsGroup: 3000
      allowPrivilegeEscalation: false
      privileged: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    command: ['sleep', '3600']
  restartPolicy: Never
---
# Test case for default ServiceAccount validation (tests SharedConfig.DefaultServiceAccountName)
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kogaro-testbed.fullname" . }}-default-serviceaccount-test
  labels:
    {{- include "kogaro-testbed.labels" . | nindent 4 }}
    test-case: "default-serviceaccount-test"
    test-category: "shared-config"
  annotations:
    test-description: "Tests default ServiceAccount handling from SharedConfig"
spec:
  # No serviceAccountName specified - should default to SharedConfig.DefaultServiceAccountName ("default")
  # This tests the SharedConfig default behavior in ReferenceValidator
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
  containers:
  - name: default-sa-container
    image: busybox:1.35
    securityContext:
      runAsUser: 1000
      runAsGroup: 3000
      allowPrivilegeEscalation: false
      privileged: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    command: ['sleep', '3600']
  restartPolicy: Never